/* ========== 音效 ========== */
let globalAudioCtx = null;
const initAudio = () => {
  try {
    if (!globalAudioCtx) {
      const A = window.AudioContext || window.webkitAudioContext;
      if (A) globalAudioCtx = new A();
    }
    if (globalAudioCtx?.state === 'suspended') globalAudioCtx.resume();
  } catch (e) {}
};

const playSound = (type = 'alarm') => {
  if (!globalAudioCtx) return;
  try {
    const now = globalAudioCtx.currentTime;
    const playTone = (freq, start, dur, vol = 0.4) => {
      const osc = globalAudioCtx.createOscillator();
      const gain = globalAudioCtx.createGain();
      osc.connect(gain); gain.connect(globalAudioCtx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(vol, start + 0.04);
      gain.gain.linearRampToValueAtTime(0, start + dur);
      osc.start(start); osc.stop(start + dur);
    };
    if (type === 'alarm') {
      playTone(880, now, 0.2); playTone(880, now + 0.3, 0.2); playTone(1046, now + 0.6, 0.4);
    } else if (type === 'complete') {
      playTone(523, now, 0.15, 0.3); playTone(659, now + 0.12, 0.15, 0.3); playTone(784, now + 0.24, 0.3, 0.3);
    } else if (type === 'tick') {
      playTone(660, now, 0.08, 0.15);

/* ========== 判斷今天該做的例行事項 ========== */
const getRoutinesForToday = (routines) => {
  const now = new Date();
  const jsDay = now.getDay();
  const todayWD = JS_WEEKDAY_MAP[jsDay];
  const todayDate = now.getDate();
  const todayMonth = MONTHS[now.getMonth()];
  return routines.filter(r => {
    if (r.period === "daily") return true;
    if (r.period === "weekly") return (r.weekdays || []).includes(todayWD);
    if (r.period === "monthly") return (r.monthdays || []).includes(todayDate);
    if (r.period === "yearly") return r.month === todayMonth;
    return false;
  });
};

/* ========== NEW: 計算連續天數 ========== */
const calcStreak = (history) => {
  const dates = Object.keys(history).filter(d => history[d] > 0).sort().reverse();
  if (dates.length === 0) return 0;
  let streak = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i = 0; i < dates.length; i++) {
    const [y,m,d] = dates[i].split('-').map(Number);
    const check = new Date(y, m-1, d); check.setHours(0,0,0,0);
    const diffDays = Math.round((today - check) / 86400000);
    if (diffDays === i || diffDays === i + 1) { streak++; } else break;
  }
  return streak;
};

/* ========== NEW: 過去7天數據 ========== */
const getLast7Days = (history) => {
  const result = [];
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const weekday = ["日","一","二","三","四","五","六"][d.getDay()];
    result.push({ date: key, weekday, count: history[key] || 0 });
  }
  return result;
};

const PriBadge = ({ value, onChange }) => {
  const [open, setOpen] = useState(false);
  const pv = PRIORITY[value] || PRIORITY.medium;
  const ref = useRef();
  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h); return () => document.removeEventListener("mousedown", h);
  }, []);
  return (
    <div ref={ref} style={{ position: "relative", display: "inline-block", flexShrink: 0 }}>
      <button onClick={() => setOpen(o => !o)}
        style={{ ...st.btn, background: pv.bg, color: pv.color, padding: "5px 10px", fontSize: 12, fontWeight: 700, border: `1.5px solid ${pv.color}`, display: "flex", alignItems: "center", gap: 4, whiteSpace: "nowrap" }}>
        {pv.emoji} {pv.label} <span style={{ fontSize: 10, opacity: 0.7 }}>▾</span>
      </button>
      {open && (
        <div style={{ position: "absolute", bottom: "110%", left: 0, zIndex: 100, background: P.card, border: `1px solid ${P.border}`, borderRadius: 10, boxShadow: "0 -4px 20px rgba(0,0,0,0.12)", overflow: "hidden", minWidth: 90 }}>
          {Object.entries(PRIORITY).map(([k, v]) => (
            <button key={k} onClick={() => { onChange(k); setOpen(false); }}
              style={{ ...st.btn, display: "block", width: "100%", textAlign: "left", padding: "10px 14px", fontSize: 13, background: k === value ? v.bg : P.card, color: k === value ? v.color : P.text, borderRadius: 0, fontWeight: k === value ? 700 : 400 }}>
              {v.emoji} {v.label}
            </button>
          ))}
        </div>
      )}
    </div>
  );
};

        <select style={{ ...st.inp, flex: 1, minWidth: 90 }} value={draft.period} onChange={e => changePeriod(e.target.value)}>

const scheduleHint = (r) => {
  if (r.period === "daily") return "每日";
  if (r.period === "weekly") { const d = (r.weekdays || []).join("、"); return d ? `每週 ${d}` : "每週"; }
  if (r.period === "monthly") { const md = (r.monthdays || []).join("、"); return md ? `每月 ${md} 號` : "每月"; }
  if (r.period === "yearly") return r.month ? `每年 ${r.month}` : "每年";
  return "";
};

/* ========== NEW: 呼吸練習全屏元件 ========== */
const BreathingExercise = ({ pattern, onClose }) => {
  const [phase, setPhase] = useState("ready"); // ready, in, hold, out, hold2, done
  const [secondsLeft, setSecondsLeft] = useState(3);
  const [cycleCount, setCycleCount] = useState(0);
  const [totalCycles] = useState(pattern.cycles);

  useEffect(() => {
    if (phase === "ready") {
      if (secondsLeft <= 0) { setPhase("in"); setSecondsLeft(pattern.inSec); return; }
      const t = setTimeout(() => { setSecondsLeft(s => s - 1); }, 1000);
      return () => clearTimeout(t);
    }
    if (phase === "done") return;

    if (secondsLeft <= 0) {
      // transition to next phase
      if (phase === "in") {
        if (pattern.holdSec > 0) { setPhase("hold"); setSecondsLeft(pattern.holdSec); }
        else { setPhase("out"); setSecondsLeft(pattern.outSec); }
      } else if (phase === "hold") {
        setPhase("out"); setSecondsLeft(pattern.outSec);
      } else if (phase === "out") {
        if (pattern.hold2Sec > 0) { setPhase("hold2"); setSecondsLeft(pattern.hold2Sec); }
        else {
          const next = cycleCount + 1;
          if (next >= totalCycles) { setPhase("done"); playSound('complete'); }
          else { setCycleCount(next); setPhase("in"); setSecondsLeft(pattern.inSec); }
        }
      } else if (phase === "hold2") {
        const next = cycleCount + 1;
        if (next >= totalCycles) { setPhase("done"); playSound('complete'); }
        else { setCycleCount(next); setPhase("in"); setSecondsLeft(pattern.inSec); }
      }
      return;
    }

    const t = setTimeout(() => setSecondsLeft(s => s - 1), 1000);
    return () => clearTimeout(t);
  }, [phase, secondsLeft]);

  const phaseLabel = { ready: "準備好了嗎？", in: "吸氣", hold: "屏住", out: "吐氣", hold2: "屏住", done: "做得好！" };
  const phaseColor = { ready: P.sub, in: P.green, hold: P.orange, out: P.accent, hold2: P.orange, done: P.green };
  const phaseAnim = phase === "in" ? "breatheIn" : phase === "out" ? "breatheOut" : "breatheHold";
  const phaseDur = phase === "in" ? pattern.inSec : phase === "hold" ? pattern.holdSec : phase === "out" ? pattern.outSec : phase === "hold2" ? pattern.hold2Sec : 1;

  return (
    <div style={{ ...st.app, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: `linear-gradient(180deg, #e8f2ec 0%, ${P.bg} 100%)`, padding: 24 }}>
      <button onClick={onClose} style={{ position: "absolute", top: "calc(env(safe-area-inset-top, 0px) + 16px)", left: 16, background: "transparent", border: "none", color: P.sub, fontSize: 15, cursor: "pointer" }}>✕ 離開</button>

      <div style={{ fontSize: 14, color: P.sub, marginBottom: 8 }}>{pattern.name}</div>
      <div style={{ fontSize: 13, color: P.sub, marginBottom: 40 }}>第 {cycleCount + 1} / {totalCycles} 輪</div>

      {/* Breathing circle */}
      <div style={{
        width: 180, height: 180, borderRadius: "50%",
        background: `radial-gradient(circle, ${phaseColor[phase]}30 0%, ${phaseColor[phase]}10 70%, transparent 100%)`,
        display: "flex", alignItems: "center", justifyContent: "center",
        animation: phase !== "ready" && phase !== "done" ? `${phaseAnim} ${phaseDur}s ease-in-out` : "none",
        transition: "all 0.5s ease",
        boxShadow: phase === "in" ? `0 0 0 0 ${phaseColor[phase]}40` : "none",
      }}>
        <div style={{
          width: 120, height: 120, borderRadius: "50%",
          background: `${phaseColor[phase]}20`, border: `3px solid ${phaseColor[phase]}`,
          display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column",
        }}>
          {phase !== "done" ? (
            <div style={{ fontSize: 36, fontWeight: 900, color: phaseColor[phase], fontFamily: "monospace" }}>{secondsLeft}</div>
          ) : (
            <div style={{ fontSize: 40 }}>🧘</div>
          )}
        </div>
      </div>

      <div style={{ fontSize: 26, fontWeight: 900, color: phaseColor[phase], marginTop: 36, fontFamily: "'Noto Serif TC', serif" }}>
        {phaseLabel[phase]}
      </div>

      {phase === "done" && (
        <div style={{ marginTop: 40 }}>
          <div style={{ fontSize: 15, color: P.sub, marginBottom: 20, textAlign: "center" }}>你剛剛給了大腦一個小假期</div>
          <button onClick={onClose} style={{ ...st.btn, background: P.green, color: "#fff", padding: "14px 40px", fontSize: 16, fontWeight: 700, borderRadius: 30 }}>回到現實</button>
        </div>
      )}
    </div>
  );
};

/* ========== NEW: Body Double 虛擬共事計時器 ========== */
const BodyDoubleTimer = ({ minutes, onClose }) => {
  const [secondsLeft, setSecondsLeft] = useState(minutes * 60);
  const [isRunning, setIsRunning] = useState(true);
  const [isFinished, setIsFinished] = useState(false);

  useEffect(() => {
    if (!isRunning || isFinished) return;
    if (secondsLeft <= 0) { setIsFinished(true); playSound('milestone'); return; }
    const t = setTimeout(() => setSecondsLeft(s => s - 1), 1000);
    return () => clearTimeout(t);
  }, [secondsLeft, isRunning, isFinished]);

  const total = minutes * 60;
  const progress = ((total - secondsLeft) / total) * 100;
  const formatClock = (sec) => `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;

  const encouragements = [
    "你不是一個人在做。",
    "專注在你的事就好。",
    "一步一步來。",
    "你正在做很棒的事。",
    "不需要完美，只要開始。",
  ];
  const encouragement = encouragements[Math.floor((total - secondsLeft) / 60) % encouragements.length];

  if (isFinished) {
    return (
      <div style={{ ...st.app, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, background: `linear-gradient(160deg, ${P.warmGlow} 0%, ${P.card} 100%)` }}>
        <div style={{ fontSize: 72, marginBottom: 20, animation: "gentleFloat 2s ease-in-out infinite" }}>🎊</div>
        <div style={{ fontSize: 28, fontWeight: 900, color: P.accent, marginBottom: 12, fontFamily: "'Noto Serif TC', serif" }}>共事時間結束！</div>
        <div style={{ fontSize: 16, color: P.sub, marginBottom: 8 }}>你專注了 {minutes} 分鐘</div>
        <div style={{ fontSize: 14, color: P.sub, marginBottom: 40 }}>休息一下，你值得的。</div>
        <button onClick={onClose} style={{ ...st.btn, background: P.accent, color: '#fff', padding: "16px 48px", fontSize: 18, fontWeight: 700, borderRadius: 30 }}>完成</button>
      </div>
    );
  }

  return (
    <div style={{ ...st.app, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, background: `linear-gradient(180deg, ${P.card} 0%, ${P.bg} 100%)` }}>
      <button onClick={() => { if(window.confirm("確定要離開共事嗎？")) onClose(); }} style={{ position: "absolute", top: "calc(env(safe-area-inset-top, 0px) + 16px)", left: 16, background: "transparent", border: "none", color: P.sub, fontSize: 15, cursor: "pointer" }}>✕ 離開</button>

      <div style={{ fontSize: 14, color: P.sub, marginBottom: 4, letterSpacing: 2 }}>🧑‍💻 虛擬共事中</div>
      <div style={{ fontSize: 13, color: P.sub, marginBottom: 40, opacity: 0.7 }}>{encouragement}</div>

      <div style={{ fontSize: 72, fontWeight: 900, color: P.accent, fontFamily: "monospace", letterSpacing: 4 }}>
        {formatClock(secondsLeft)}
      </div>

      <div style={{ width: "80%", height: 8, background: P.tag, borderRadius: 4, overflow: "hidden", marginTop: 30 }}>
        <div style={{ width: `${progress}%`, height: "100%", background: `linear-gradient(90deg, ${P.accent}, ${P.green})`, transition: "width 1s linear", borderRadius: 4, animation: "barGrow 0.5s ease-out" }} />
      </div>

      <div style={{ marginTop: 40, display: "flex", gap: 16 }}>
        <button onClick={() => setIsRunning(r => !r)} style={{ ...st.btn, background: P.tag, color: P.accent, width: 60, height: 60, borderRadius: 30, fontSize: 22, display: "flex", alignItems: "center", justifyContent: "center" }}>
          {isRunning ? "⏸" : "▶️"}
        </button>
        <button onClick={() => { setSecondsLeft(0); }} style={{ ...st.btn, background: P.accent, color: "#fff", height: 60, borderRadius: 30, padding: "0 32px", fontSize: 16, fontWeight: 700 }}>
          結束共事
        </button>
      </div>
    </div>
  );
};

const App = () => {
  const [data, setData] = useState(loadData);
  const [now, setNow] = useState(new Date());
  const [tab, setTab] = useState("today");
  const [newDL, setNewDL] = useState({ name: "", date: "" });
  const [newPending, setNewPending] = useState("");
  const [newAlarm, setNewAlarm] = useState({ label: "", type: "fixed", time: "", interval: 1, start: "09:00", end: "21:00" });
  const [editPresetsMode, setEditPresetsMode] = useState(false);
  const [newPreset, setNewPreset] = useState({ label: "", type: "fixed", time: "", interval: 1, start: "09:00", end: "21:00" });
  const [newRoutine, setNewRoutine] = useState(emptyDraft("weekly"));
  const [showRoutineForm, setShowRoutineForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [editDraft, setEditDraft] = useState({});
  const [editingFocus, setEditingFocus] = useState(null);
  const [focusDraft, setFocusDraft] = useState(null);
  const [activeTimer, setActiveTimer] = useState(null);
  const [timerCountdown, setTimerCountdown] = useState(null);
  const [firedAlarmsRef] = useState(() => new Set());
  const [banner, setBanner] = useState(null);
  const [showBurst, setShowBurst] = useState(false);
  const [welcomeBack, setWelcomeBack] = useState(false);

  // NEW states
  const [activeMilestone, setActiveMilestone] = useState(null);
  const [activeBreathing, setActiveBreathing] = useState(null);
  const [activeBodyDouble, setActiveBodyDouble] = useState(null);
  const [nudgeText, setNudgeText] = useState(null);
  const [showMoodForm, setShowMoodForm] = useState(false);
  const [moodNote, setMoodNote] = useState("");
  const [moodEmoji, setMoodEmoji] = useState("😊");

  // 時鐘
  useEffect(() => { const t = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(t); }, []);
  // 儲存
  useEffect(() => { saveData(data); }, [data]);

  // 日期變更
  const lastDateRef = useRef(todayStr());
  useEffect(() => {
    const today = todayStr();
    if (today !== lastDateRef.current) {
      firedAlarmsRef.clear();
      lastDateRef.current = today;
      setData(d => ({ ...d, completedToday: [], anchor: "" }));
    }
  }, [now]);

  // 每日自動生成
  useEffect(() => {
    const today = todayStr();
    if (data.lastAutoGenDate === today) return;
    const todayRoutines = getRoutinesForToday(data.routines);
    const existingTexts = new Set(data.pendingItems.map(p => p.text));
    const newItems = todayRoutines
      .filter(r => !existingTexts.has(r.label))
      .map(r => ({ id: genId(), text: r.label, priority: "medium", fromRoutine: r.id }));
    if (newItems.length > 0 || data.lastAutoGenDate !== today) {
      setData(d => ({ ...d, pendingItems: [...newItems, ...d.pendingItems], lastAutoGenDate: today }));
    }
  }, []);

  // 歡迎回來
  useEffect(() => {
    const lastVisit = localStorage.getItem("adhd_lastVisit");
    const today = todayStr();
    if (lastVisit && lastVisit !== today) {
      setWelcomeBack(true);
      setTimeout(() => setWelcomeBack(false), 4000);
    }
    localStorage.setItem("adhd_lastVisit", today);
  }, []);

  // 鬧鐘觸發
  useEffect(() => {
    const hh = String(now.getHours()).padStart(2, "0");
    const mm = String(now.getMinutes()).padStart(2, "0");
    const cur = `${hh}:${mm}`;
    const dateKey = todayStr();
    (data.alarms || []).forEach(a => {
      const fireKey = `${dateKey}_${a.id}_${cur}`;
      if (a.enabled && a.time === cur && !firedAlarmsRef.has(fireKey)) {
        firedAlarmsRef.add(fireKey);
        safeNotify(a.label);
        playSound('alarm');
        setBanner(a.label);
        setTimeout(() => setBanner(null), 5000);
      }
    });
  }, [now, data.alarms]);

  // 定時器倒數
  useEffect(() => {
    const interval = setInterval(() => {
      setActiveTimer(prev => {
        if (!prev || !prev.isRunning || prev.isFinished) return prev;
        const curStep = prev.template.steps[prev.stepIndex];
        if (curStep.duration === 0) return prev;
        if (prev.secondsLeft > 1) {
          return { ...prev, secondsLeft: prev.secondsLeft - 1 };
        } else {
          playSound('alarm');
          safeNotify(`${curStep.text} 時間到！`);
          const nextIdx = prev.stepIndex + 1;
          if (nextIdx < prev.template.steps.length) {
            const nextStep = prev.template.steps[nextIdx];
            return { ...prev, stepIndex: nextIdx, secondsLeft: nextStep.duration, isRunning: nextStep.duration > 0 };
          } else {
            playSound('complete');
            return { ...prev, isFinished: true, isRunning: false };
          }
        }
      });
    }, 1000);
    return () => clearInterval(interval);
  }, []);

  const upd = (p) => setData(d => ({ ...d, ...p }));

  // 出門倒數
  const prepStart = () => { if (!data.leaveTime) return null; const [h, m] = data.leaveTime.split(":").map(Number); const t = ((h * 60 + m - (data.prepMinutes || 0)) % 1440 + 1440) % 1440; return `${String(Math.floor(t / 60)).padStart(2, "0")}:${String(t % 60).padStart(2, "0")}`; };

        <div style={st.sec}>
          <div style={st.sH}>
            <span style={st.sT}>🔁 例行事項</span>
            <button onClick={() => { setShowRoutineForm(v => !v); setEditingId(null); }} style={{ ...st.btn, background: showRoutineForm ? P.tag : P.accent, color: showRoutineForm ? P.accent : "#fff", padding: "6px 14px", fontSize: 13 }}>{showRoutineForm ? "取消" : "＋ 自訂"}</button>
          </div>
          <div style={st.sB}>
            {showRoutineForm && (
              <div style={{ background: P.tag, borderRadius: 12, padding: 14, marginBottom: 18 }}>
                <div style={{ fontSize: 13, color: P.sub, fontWeight: 700, marginBottom: 10 }}>新增例行事項</div>
                <RoutineFields draft={newRoutine} setDraft={setNewRoutine} />
                <button style={{ ...st.btn, background: canSave(newRoutine) ? P.accent : "#c8bfb5", color: "#fff", width: "100%", marginTop: 4 }} onClick={addRoutine}>確認新增</button>
              </div>
            )}

            {(() => {
              const todayRoutines = getRoutinesForToday(data.routines);
              if (todayRoutines.length === 0) return null;
              return (
                <div style={{ marginBottom: 20 }}>
                  <div style={{ fontSize: 12, color: P.green, fontWeight: 700, marginBottom: 10, letterSpacing: 1, display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ width: 8, height: 8, borderRadius: 4, background: P.green, display: "inline-block" }}></span> 今日應做
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                    {todayRoutines.map(r => {
                      const inPending = data.pendingItems.some(p => p.fromRoutine === r.id || p.text === r.label);
                      const doneToday = data.completedToday?.some(c => c.text === r.label);
                      return (
                        <div key={r.id} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <button onClick={() => { if (!inPending && !doneToday) addPending(r.label, "medium"); }}
                            style={{ ...st.btn, flex: 1, display: "flex", alignItems: "center", gap: 10, padding: "12px 16px", fontSize: 14, justifyContent: "flex-start", textAlign: "left",
                              background: doneToday ? P.green : inPending ? P.tag : P.card, color: doneToday ? "#fff" : P.text,
                              border: `1px solid ${doneToday ? P.green : inPending ? P.accent : P.border}`, opacity: doneToday ? 0.7 : 1 }}>
                            <span style={{ fontSize: 20 }}>{r.icon}</span>
                            <div>
                              <div style={{ fontWeight: 600 }}>{r.label}</div>
                              {r.lastDone && <div style={{ fontSize: 11, color: doneToday ? "rgba(255,255,255,0.7)" : P.sub, marginTop: 2 }}>上次完成：{r.lastDone}</div>}
                            </div>
                            {doneToday && <span style={{ marginLeft: "auto", fontSize: 14 }}>✓ 已完成</span>}
                            {inPending && !doneToday && <span style={{ marginLeft: "auto", fontSize: 12, color: P.accent }}>已排入</span>}
                          </button>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })()}

            {Object.entries(grouped).map(([period, items]) => items.length === 0 ? null : (
              <div key={period} style={{ marginBottom: 20 }}>
                <div style={{ fontSize: 12, color: P.sub, fontWeight: 700, marginBottom: 10, letterSpacing: 1 }}>{PERIOD_LABEL[period]}</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {items.map(r => {
                    if (editingId === r.id) return (
                      <div key={r.id} style={{ background: P.tag, borderRadius: 12, padding: 12 }}>
                        <RoutineFields draft={editDraft} setDraft={setEditDraft} />
                        <div style={{ ...st.row, gap: 8, marginTop: 8 }}>
                          <button style={{ ...st.btn, background: canSave(editDraft) ? P.accent : "#c8bfb5", color: "#fff", flex: 1 }} onClick={() => saveEdit(r.id)}>儲存</button>
                          <button style={{ ...st.btn, background: P.tag, color: P.accent, flex: 1 }} onClick={() => setEditingId(null)}>取消</button>
                        </div>
                      </div>
                    );
                    return (
                      <div key={r.id} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", background: P.card, border: `1px solid ${P.border}`, borderRadius: 12 }}>
                          <span style={{ fontSize: 20 }}>{r.icon}</span>
                          <div>
                            <div style={{ fontSize: 14, fontWeight: 600 }}>{r.label}</div>
                            <div style={{ fontSize: 11, color: P.sub, marginTop: 2 }}>
                              {scheduleHint(r)}
                              {r.lastDone && <span style={{ marginLeft: 8 }}>· 上次：{r.lastDone}</span>}
                            </div>
                          </div>
                        </div>
                        <button onClick={() => startEdit(r)} style={{ ...st.btn, background: P.tag, color: P.accent, padding: "8px 11px", fontSize: 13 }}>✏️</button>
                        <button onClick={() => deleteRoutine(r.id)} style={{ ...st.btn, background: "#fbe9e2", color: P.danger, padding: "8px 11px", fontSize: 13 }}>✕</button>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ==================== 提醒頁籤 ==================== */}
      {tab === "alarms" && (
        <div style={st.sec}>
          <div style={st.sH}><span style={st.sT}>⏰ 提醒設定</span></div>
          <div style={st.sB}>
            <div style={{ background: `linear-gradient(135deg, ${P.tag}, ${P.warmGlow})`, borderRadius: 10, padding: "10px 14px", fontSize: 13, color: P.sub, marginBottom: 16, border: `1px solid ${P.border}` }}>
              ⚠️ 提醒需要<strong>瀏覽器通知權限</strong>，且<strong>此頁面必須保持開啟</strong>。建議將此頁加入主畫面使用。
            </div>

            <div style={{ marginBottom: 20 }}>
              <div style={{ ...st.row, marginBottom: 8, flexWrap: "wrap", gap: 8 }}>
                <input style={{ ...st.inp, flex: 2, minWidth: 120 }} placeholder="自訂提醒名稱" value={newAlarm.label} onChange={e => setNewAlarm(a => ({ ...a, label: e.target.value }))} onKeyDown={e => e.key === "Enter" && addAlarm()} />
                <select style={{ ...st.inp, flex: 1, minWidth: 100 }} value={newAlarm.type} onChange={e => setNewAlarm(a => ({ ...a, type: e.target.value }))}>
                  <option value="fixed">單次</option><option value="interval">間隔重複</option>
                </select>
              </div>
              {newAlarm.type === 'fixed' ? (
                <div style={{ ...st.row, flexWrap: "wrap", gap: 8 }}>
                  <input type="time" style={{ ...st.inp, flex: 1, minWidth: 100 }} value={newAlarm.time} onChange={e => setNewAlarm(a => ({ ...a, time: e.target.value }))} />
                  <button style={{ ...st.btn, background: P.accent, color: "#fff", whiteSpace: "nowrap" }} onClick={addAlarm}>+ 新增</button>
                </div>
              ) : (
                <div style={{ background: P.card, border: `1px solid ${P.border}`, borderRadius: 10, padding: 12 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 4, marginBottom: 8 }}>
                    <span style={{ fontSize: 13 }}>每</span>
                    <input type="number" step="0.5" min="0.5" style={{ ...st.inp, padding: "6px", width: 60, textAlign: "center" }} value={newAlarm.interval} onChange={e => setNewAlarm({ ...newAlarm, interval: e.target.value })} />
                    <span style={{ fontSize: 13 }}>小時。時段：</span>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
                    <input type="time" style={{ ...st.inp, padding: "8px", flex: 1 }} value={newAlarm.start} onChange={e => setNewAlarm({ ...newAlarm, start: e.target.value })} />
                    <span style={{ fontSize: 12, color: P.sub }}>到</span>
                    <input type="time" style={{ ...st.inp, padding: "8px", flex: 1 }} value={newAlarm.end} onChange={e => setNewAlarm({ ...newAlarm, end: e.target.value })} />
                  </div>
                  <button style={{ ...st.btn, background: P.accent, color: "#fff", width: "100%", padding: "8px" }} onClick={addAlarm}>+ 批次新增</button>
                </div>
              )}
            </div>

            <div style={{ marginBottom: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <div style={{ fontSize: 12, color: P.sub }}>常用快捷</div>
                <button onClick={() => setEditPresetsMode(!editPresetsMode)} style={{ ...st.btn, background: "transparent", color: P.accent, padding: 0, fontSize: 12 }}>
                  {editPresetsMode ? "完成" : "✏️ 編輯"}
                </button>
              </div>
              {!editPresetsMode ? (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {data.alarmPresets.map(p => (
                    <button key={p.id} onClick={() => applyPreset(p)} style={{ ...st.btn, background: P.card, color: P.accent, border: `1px solid ${P.border}`, fontSize: 13, padding: "7px 14px" }}>
                      ＋ {p.label} <span style={{ opacity: 0.6, fontSize: 11 }}>{p.type === 'fixed' ? p.time : formatIntervalShort(p.interval)}</span>
                    </button>
                  ))}
                </div>
              ) : (
                <div style={{ background: P.tag, borderRadius: 10, padding: 12 }}>
                  {data.alarmPresets.map(p => (
                    <div key={p.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${P.border}` }}>
                      <div style={{ fontSize: 13 }}>
                        <span style={{ fontWeight: 700, marginRight: 8 }}>{p.label}</span>
                        <span style={{ color: P.sub, fontSize: 12 }}>{p.type === 'fixed' ? p.time : `${formatIntervalZh(p.interval)} (${p.start}-${p.end})`}</span>
                      </div>
                      <button onClick={() => deletePreset(p.id)} style={{ background: "transparent", border: "none", color: P.danger, cursor: "pointer", fontSize: 16 }}>✕</button>
                    </div>
                  ))}
                  <div style={{ marginTop: 12, paddingTop: 12 }}>
                    <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 8 }}>新增快捷</div>
                    <div style={{ ...st.row, flexWrap: "wrap", gap: 8, marginBottom: 8 }}>
                      <input style={{ ...st.inp, flex: 2, minWidth: 100, padding: "8px" }} placeholder="名稱" value={newPreset.label} onChange={e => setNewPreset({ ...newPreset, label: e.target.value })} />
                      <select style={{ ...st.inp, flex: 1, minWidth: 100, padding: "8px" }} value={newPreset.type} onChange={e => setNewPreset({ ...newPreset, type: e.target.value })}>
                        <option value="fixed">固定</option><option value="interval">間隔</option>
                      </select>
                    </div>
                    {newPreset.type === 'fixed' ? (
                      <div style={{ ...st.row, gap: 8 }}>
                        <input type="time" style={{ ...st.inp, flex: 1, padding: "8px" }} value={newPreset.time} onChange={e => setNewPreset({ ...newPreset, time: e.target.value })} />
                        <button style={{ ...st.btn, background: P.accent, color: "#fff", padding: "8px 14px" }} onClick={addPreset}>儲存</button>
                      </div>
                    ) : (
                      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                          <span style={{ fontSize: 13 }}>每</span>
                          <input type="number" step="0.5" min="0.5" style={{ ...st.inp, padding: "6px", width: 60, textAlign: "center" }} value={newPreset.interval} onChange={e => setNewPreset({ ...newPreset, interval: e.target.value })} />
                          <span style={{ fontSize: 13 }}>小時。時段：</span>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <input type="time" style={{ ...st.inp, padding: "8px", flex: 1 }} value={newPreset.start} onChange={e => setNewPreset({ ...newPreset, start: e.target.value })} />
                          <span style={{ fontSize: 12, color: P.sub }}>到</span>
                          <input type="time" style={{ ...st.inp, padding: "8px", flex: 1 }} value={newPreset.end} onChange={e => setNewPreset({ ...newPreset, end: e.target.value })} />
                        </div>
                        <button style={{ ...st.btn, background: P.accent, color: "#fff", width: "100%", padding: "8px" }} onClick={addPreset}>儲存</button>
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>

            {(data.alarms || []).length > 0 && (
              <div style={{ borderTop: `1px solid ${P.border}`, paddingTop: 16 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <div style={{ fontSize: 12, color: P.sub }}>今日排定 ({data.alarms.length} 個)</div>
                  <button onClick={clearAllAlarms} style={{ ...st.btn, background: "#fbe9e2", color: P.danger, padding: "4px 10px", fontSize: 12 }}>🗑️ 清除全部</button>
                </div>
                {[...(data.alarms || [])].sort((a, b) => a.time.localeCompare(b.time)).map((a, i) => (
                  <div key={a.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "11px 0", borderTop: i > 0 ? `1px solid ${P.border}` : "none" }}>
                    <div style={{ ...st.row, gap: 12 }}>
                      <div style={{ fontFamily: "monospace", fontSize: 17, color: a.enabled ? P.accent : P.sub, fontWeight: 700 }}>{a.time}</div>
                      <div style={{ fontSize: 14, color: a.enabled ? P.text : P.sub }}>{a.label}</div>
                    </div>
                    <div style={{ ...st.row, gap: 6 }}>
                      <button onClick={() => upd({ alarms: data.alarms.map(al => al.id === a.id ? { ...al, enabled: !al.enabled } : al) })}
                        style={{ ...st.btn, background: a.enabled ? P.green : P.tag, color: a.enabled ? "#fff" : P.sub, padding: "5px 12px", fontSize: 12, borderRadius: 16 }}>
                        {a.enabled ? "開" : "關"}
                      </button>
                      <button style={{ ...st.btn, background: "#fbe9e2", color: P.danger, padding: "5px 10px", fontSize: 12 }}
                        onClick={() => upd({ alarms: data.alarms.filter(al => al.id !== a.id) })}>✕</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}

      {/* ==================== NEW: 回顧頁籤 ==================== */}
      {tab === "stats" && (
        <div>
          {/* 連續天數 & 總成就 */}
          <div style={st.sec}>
            <div style={st.sB}>
              <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
                <div style={{ flex: 1, textAlign: "center", padding: "16px 8px", background: `linear-gradient(135deg, ${P.reward}15, ${P.warmGlow})`, borderRadius: 14 }}>
                  <div style={{ fontSize: 36, fontWeight: 900, color: P.reward, fontFamily: "'Noto Serif TC', serif" }}>
                    {streak > 0 ? `🔥 ${streak}` : "—"}
                  </div>
                  <div style={{ fontSize: 12, color: P.sub, marginTop: 4 }}>連續天數</div>
                </div>
                <div style={{ flex: 1, textAlign: "center", padding: "16px 8px", background: `linear-gradient(135deg, ${P.green}15, ${P.warmGlow})`, borderRadius: 14 }}>
                  <div style={{ fontSize: 36, fontWeight: 900, color: P.green, fontFamily: "'Noto Serif TC', serif" }}>
                    {data.totalCompleted || 0}
                  </div>
                  <div style={{ fontSize: 12, color: P.sub, marginTop: 4 }}>累計完成</div>
                </div>
              </div>
            </div>
          </div>

          {/* 過去 7 天 */}
          <div style={st.sec}>
            <div style={st.sH}><span style={st.sT}>📊 過去 7 天</span></div>
            <div style={st.sB}>
              <div style={{ display: "flex", gap: 6, alignItems: "flex-end", height: 120, padding: "0 4px" }}>
                {last7.map((day, i) => {
                  const h = day.count > 0 ? Math.max(20, (day.count / maxLast7) * 90) : 4;
                  const isToday = day.date === todayStr();
                  return (
                    <div key={day.date} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                      <div style={{ fontSize: 12, fontWeight: 700, color: day.count > 0 ? P.green : P.sub }}>{day.count || ""}</div>
                      <div style={{
                        width: "100%", height: h, borderRadius: 6,
                        background: day.count > 0 ? `linear-gradient(180deg, ${P.green}, ${P.green}90)` : P.tag,
                        transition: "height 0.5s ease", animation: "barGrow 0.8s ease-out",
                        border: isToday ? `2px solid ${P.accent}` : "none",
                      }} />
                      <div style={{ fontSize: 11, color: isToday ? P.accent : P.sub, fontWeight: isToday ? 700 : 400 }}>{day.weekday}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* 里程碑 */}
          <div style={st.sec}>
            <div style={st.sH}><span style={st.sT}>🏆 里程碑</span></div>
            <div style={st.sB}>
              {MILESTONES.map((m, i) => {
                const reached = completedCount >= m.count;
                return (
                  <div key={m.count} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 0", borderTop: i > 0 ? `1px solid ${P.border}` : "none", opacity: reached ? 1 : 0.4 }}>
                    <div style={{ fontSize: 28, width: 44, textAlign: "center", animation: reached ? "starPop 0.5s ease-out" : "none" }}>{m.emoji}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 14, fontWeight: 700, color: reached ? P.accent : P.sub }}>{m.title}</div>
                      <div style={{ fontSize: 12, color: P.sub }}>{m.msg}</div>
                    </div>
                    <div style={{ fontSize: 13, color: reached ? P.green : P.sub, fontWeight: 700 }}>
                      {reached ? "✓" : `${m.count} 件`}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* 心情回顧 */}
          {data.moodLog.length > 0 && (
            <div style={st.sec}>
              <div style={st.sH}><span style={st.sT}>💭 近期心情</span></div>
              <div style={st.sB}>
                <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                  {data.moodLog.slice(-14).map((entry, i) => (
                    <div key={i} title={`${entry.date} ${entry.time}\n${entry.note || ""}`}
                      style={{ width: 36, height: 36, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, background: P.tag, borderRadius: 8 }}>
                      {entry.mood}
                    </div>
                  ))}
                </div>
                <button onClick={() => upd({ moodLog: [] })} style={{ ...st.btn, background: P.tag, color: P.sub, padding: "6px 12px", fontSize: 12, marginTop: 12 }}>清除心情記錄</button>
              </div>
            </div>
          )}
        </div>
      )}

      <div style={{ textAlign: "center", marginTop: 32, fontSize: 13, color: P.sub, fontFamily: "'Noto Serif TC', serif", letterSpacing: 2 }}>
        一次只需要做好一件事 ✦
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
